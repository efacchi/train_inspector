<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Train Tracker - Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom gradient for the vertical timeline line */
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 23px;
            top: 24px;
            bottom: 24px;
            width: 2px;
            background: linear-gradient(to bottom, #3b82f6 var(--passed-route, 0%), #1e293b var(--passed-route, 0%));
            z-index: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-4 md:p-8 selection:bg-blue-500/30">

    <div class="max-w-xl mx-auto">
        <header class="text-center mb-8">
            <h1
                class="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
                🚆 LIVE TRAIN TRACKER
            </h1>
            <p class="text-xs text-slate-500 mt-1 font-mono">VIA RANDOM CODES UNTIL IT WORKED v2.0</p>
        </header>

        <div
            class="flex gap-2 bg-slate-900/80 p-2 rounded-2xl border border-slate-800/80 shadow-2xl mb-6 backdrop-blur-md">
            <input type="text" id="trainInput" placeholder="Enter train number (e.g. 17296 or 9544)"
                class="w-full px-4 py-3 bg-transparent rounded-xl focus:outline-none text-base placeholder:text-slate-600 font-mono tracking-wider"
                onkeypress="if(event.key === 'Enter') searchTrain()">
            <button onclick="searchTrain()"
                class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 font-bold px-6 py-3 rounded-xl transition-all shadow-lg shadow-blue-900/40 cursor-pointer active:scale-98">
                Track
            </button>
        </div>

        <!-- Auto Refresh Control Widget -->
        <div id="autoRefreshWidget"
            class="hidden bg-slate-900/40 border border-slate-800/60 p-4 rounded-2xl flex items-center justify-between transition-all duration-300 backdrop-blur-md mb-6 animate-fade-in">
            <div class="flex items-center gap-3">
                <span class="relative flex h-3 w-3">
                    <span id="autoRefreshStatusPing"
                        class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-emerald-400"></span>
                    <span id="autoRefreshStatusDot"
                        class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <div>
                    <p class="text-xs font-bold tracking-wide text-slate-200">Auto Refresh</p>
                    <p id="autoRefreshStatusText" class="text-[10px] font-mono text-slate-500 mt-0.5">Next check
                        in 120s</p>
                </div>
            </div>
            <button id="btnToggleAutoRefresh" onclick="toggleAutoRefresh()"
                class="bg-slate-800 hover:bg-slate-750 text-slate-300 border border-slate-700/60 font-mono text-[10px] font-black tracking-wider px-3.5 py-1.5 rounded-lg transition-all cursor-pointer active:scale-98 shadow-sm">
                PAUSE
            </button>
        </div>

        <div id="loader" class="hidden text-center py-8">
            <div
                class="inline-block h-8 w-8 animate-spin rounded-full border-4 border-solid border-blue-500 border-r-transparent align-[-0.125em] motion-reduce:animate-[spin_1.5s_linear_infinite]">
            </div>
            <p class="text-xs text-slate-500 font-mono mt-2">Querying peripheral nodes...</p>
        </div>

        <div id="infoBox"
            class="hidden bg-slate-900 border border-slate-800/60 rounded-2xl p-5 mb-6 shadow-xl transition-all duration-300">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span id="txtCategory"
                        class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[10px] font-black tracking-widest px-2.5 py-1 rounded-md uppercase mr-2 font-mono"></span>
                    <h2 id="txtTrain" class="text-2xl font-black inline-block tracking-tight text-white"></h2>
                </div>
                <span id="txtDelay" class="text-xs font-bold px-3 py-1.5 rounded-lg font-mono"></span>
            </div>
            <div class="flex items-center gap-2 text-slate-400 text-sm font-semibold border-t border-slate-800/60 pt-3">
                <span class="text-blue-500">🛤️</span>
                <p id="txtRoute" class="tracking-wide"></p>
            </div>
        </div>

        <div id="timelineContainer" class="relative hidden">
            <div id="txtLastDetection"
                class="text-xs text-slate-400 bg-slate-900 border border-slate-800 rounded-xl p-3 mb-6 font-mono flex items-center gap-2">
            </div>

            <div id="timeline" class="timeline-line relative space-y-0 pl-1">
            </div>
        </div>
    </div>

    <script>
        // Utility to convert Unix timestamp in milliseconds to HH:MM format
        function formatTime(timestamp) {
            if (!timestamp) return '--:--';
            return new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        // Global variables for Auto Refresh management (polling every 2 minutes = 120s)
        let isAutoRefreshActive = false;
        let countdownTimer = null;
        const REFRESH_PERIOD = 120; // seconds
        let refreshSecondsLeft = REFRESH_PERIOD;
        let isStationsExpanded = false; // State of the expansion of passed stations

        async function searchTrain(isAuto = false) {
            const number = document.getElementById('trainInput').value.trim();
            if (!number) return;

            // Reset and activate loader
            const loader = document.getElementById('loader');
            const infoBox = document.getElementById('infoBox');
            const timelineContainer = document.getElementById('timelineContainer');
            const autoWidget = document.getElementById('autoRefreshWidget');

            // Reset the expansion state only if it is a new manual search
            if (!isAuto) {
                isStationsExpanded = false;
                loader.classList.remove('hidden');
                infoBox.classList.add('hidden');
                timelineContainer.classList.add('hidden');
            }

            try {
                const res = await fetch(`/api/train/${number}`);
                if (!res.ok) throw new Error("Train not found");
                const data = await res.json();

                // Hide loader and show interface blocks
                loader.classList.add('hidden');
                infoBox.classList.remove('hidden');
                timelineContainer.classList.remove('hidden');

                // Populate General Info Header
                document.getElementById('txtTrain').innerText = `Train ${data.number}`;
                document.getElementById('txtCategory').innerText = data.category || 'REG';
                document.getElementById('txtRoute').innerText = `${data.origin}  ➔  ${data.destination}`;
                document.getElementById('txtLastDetection').innerHTML = `<span class="text-blue-500">📡</span> Telemetry detection: <span class="text-slate-200 font-bold">${data.lastDetection.node}</span> at <span class="text-blue-400 font-bold">${data.lastDetection.time}</span>`;

                // Delay badge configuration
                const rBox = document.getElementById('txtDelay');
                rBox.innerText = data.generalStatus.toUpperCase();
                if (data.delay > 0) {
                    rBox.className = "text-xs font-bold px-3 py-1.5 rounded-lg bg-red-500/10 text-red-400 border border-red-500/20 font-mono";
                } else {
                    rBox.className = "text-xs font-bold px-3 py-1.5 rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 font-mono";
                }

                const container = document.getElementById('timeline');
                container.innerHTML = ''; // Clear previous timeline

                // Calculate indexes for the graphical management of the background vertical bar
                let lastPassedIdx = -1;
                data.stations.forEach((s, idx) => {
                    if (s.passed) {
                        lastPassedIdx = idx;
                    }
                });

                // Dynamic calculation of the completion percentage to fade the timeline line
                const linePercentage = data.stations.length > 1 ? (lastPassedIdx / (data.stations.length - 1)) * 100 : 0;
                document.querySelector('.timeline-line').style.setProperty('--passed-route', `${linePercentage}%`);

                // Identify which stations are "passed intermediate"
                // These are passed stations (s.passed === true) that are NOT the first one (idx > 0) and NOT the last passed one (idx < lastPassedIdx)
                const intermediatePassedIndices = [];
                data.stations.forEach((s, idx) => {
                    if (s.passed && idx > 0 && idx < lastPassedIdx) {
                        intermediatePassedIndices.push(idx);
                    }
                });

                const shouldCollapse = intermediatePassedIndices.length > 2;

                let collapsedContainer = null;
                if (shouldCollapse) {
                    collapsedContainer = document.createElement('div');
                    collapsedContainer.id = "collapsedStations";
                    collapsedContainer.className = isStationsExpanded ? "transition-all duration-300" : "hidden transition-all duration-300";
                }

                // Render loop over the nodes
                data.stations.forEach((s, idx) => {

                    // 1. Build Standard Commercial Station block
                    const stationRow = document.createElement('div');
                    stationRow.className = "mb-4 ml-12 relative z-10 animate-fade-in";

                    let dotClass = "bg-slate-950 border-slate-800 text-slate-700";
                    let containerClass = "bg-slate-900/40 border-slate-900/80";

                    if (s.passed) {
                        dotClass = "bg-blue-600 border-blue-400 text-blue-200 shadow-[0_0_12px_rgba(59,130,246,0.5)]";
                        containerClass = "bg-slate-900 border-slate-800";
                    }

                    stationRow.innerHTML = `
                        <span class="absolute -left-[37px] top-1.5 flex h-4 w-4 items-center justify-center rounded-full border-2 ${dotClass}"></span>
                        
                        <div class="flex justify-between items-start border p-2.5 rounded-xl transition-all duration-200 hover:bg-slate-900/90 ${containerClass}">
                            <div>
                                <p class="text-slate-100 text-sm font-bold tracking-wide">🚉 ${s.station}</p>
                                <p class="text-[10px] font-mono text-slate-500 mt-1">
                                    SCHED PLAT: <span class="text-slate-400">${s.scheduledPlatform}</span> | 
                                    ACT: <span class="${s.passed ? 'text-blue-400 font-bold' : 'text-slate-500'}">${s.actualPlatform}</span>
                                </p>
                            </div>
                            <div class="text-right font-mono text-xs">
                                <p class="text-slate-500">SCHED: ${formatTime(s.scheduled)}</p>
                                <p class="${s.passed ? 'text-blue-400 font-bold' : 'text-slate-700'}">ACT: ${formatTime(s.actual)}</p>
                            </div>
                        </div>
                    `;

                    if (shouldCollapse && intermediatePassedIndices.includes(idx)) {
                        collapsedContainer.appendChild(stationRow);
                    } else {
                        // Before inserting the first element AFTER the collapsed group (which will be lastPassedIdx),
                        // we insert the collapsed container and the toggle button
                        if (shouldCollapse && idx === lastPassedIdx) {
                            container.appendChild(collapsedContainer);

                            const toggleRow = document.createElement('div');
                            toggleRow.id = "toggleCollapsedRow";
                            toggleRow.className = "mb-4 ml-12 relative z-10 cursor-pointer group animate-fade-in";
                            toggleRow.innerHTML = `
                                <span class="absolute -left-[37px] top-1.5 flex h-4 w-4 items-center justify-center rounded-full border-2 border-slate-800 bg-slate-950 text-slate-500 group-hover:border-blue-500/50 group-hover:text-blue-400 transition-colors">
                                    <span id="toggleCollapsedIcon" class="text-[8px] transition-transform duration-200">${isStationsExpanded ? '▲' : '▼'}</span>
                                </span>
                                <div onclick="toggleStationsPassed()" class="border border-dashed border-slate-800/80 hover:border-slate-700/60 bg-slate-900/20 hover:bg-slate-900/40 p-2.5 rounded-xl text-center text-xs text-slate-500 hover:text-slate-300 font-bold tracking-wide transition-all">
                                    ${isStationsExpanded ? 'Hide previous stations' : `Show <span class="font-black text-blue-400 font-mono">${intermediatePassedIndices.length}</span> more passed stations`}
                                </div>
                            `;
                            container.appendChild(toggleRow);
                        }

                        container.appendChild(stationRow);
                    }

                    // 2. INTERMEDIATE LOGIC INJECTION (If the train has passed this station, is in transit, and a technical blind spot has been detected)
                    if (idx === lastPassedIdx && data.lastDetection.is_technical && !data.arrived) {
                        const technicalRow = document.createElement('div');
                        technicalRow.className = "mb-4 ml-12 relative z-10 animate-fade-in";

                        technicalRow.innerHTML = `
                            <span class="absolute -left-[37px] top-3.5 flex h-4 w-4 items-center justify-center rounded-full border-2 bg-amber-500 border-amber-400 animate-pulse shadow-[0_0_14px_rgba(245,158,11,0.6)]"></span>
                            
                            <div class="bg-amber-950/10 border border-amber-900/30 p-2.5 rounded-xl ml-1 flex justify-between items-center bg-gradient-to-r from-amber-950/20 to-transparent">
                                <div class="text-xs text-amber-400 font-mono tracking-wider flex items-center gap-2">
                                    <span class="text-sm">⚙️</span> PASSED THROUGH: <span class="font-black text-amber-200 underline decoration-amber-500/50">${data.lastDetection.node}</span>
                                </div>
                                <div class="text-[10px] font-mono text-amber-400/90 font-bold bg-amber-900/30 px-2.5 py-1 rounded-md border border-amber-800/40 shadow-inner">
                                    ⏱️ ${data.lastDetection.time}
                                </div>
                            </div>
                        `;
                        container.appendChild(technicalRow);
                    }
                });

                // Auto Refresh management depending on how the search was started
                if (!isAuto) {
                    // Manual search: activate auto refresh (if the train has not arrived yet)
                    activateAutoRefresh(data.arrived);
                } else {
                    // Periodic automatic update: if the train has arrived, stop it completely
                    if (data.arrived) {
                        deactivateAutoRefresh(true);
                    } else {
                        // Reset remaining time for the next cycle
                        refreshSecondsLeft = REFRESH_PERIOD;
                    }
                }

            } catch (err) {
                if (!isAuto) {
                    loader.classList.add('hidden');
                    alert("Unable to track the train. Please check if the train is currently running.");
                } else {
                    console.error("Auto-refresh failed (retrying in next cycle):", err);
                    // In case of a temporary error during auto-refresh, let the cycle pass or shorten the wait time to 10s to retry sooner
                    refreshSecondsLeft = 10;
                }
            }
        }

        function updateAutoRefreshInterface() {
            const ping = document.getElementById('autoRefreshStatusPing');
            const dot = document.getElementById('autoRefreshStatusDot');
            const text = document.getElementById('autoRefreshStatusText');
            const btn = document.getElementById('btnToggleAutoRefresh');

            if (isAutoRefreshActive) {
                ping.classList.remove('hidden');
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                text.innerText = `Next check in ${refreshSecondsLeft}s`;
                btn.innerText = "PAUSE";
                btn.className = "bg-amber-950/20 hover:bg-amber-950/40 text-amber-400 border border-amber-900/30 font-mono text-[10px] font-black tracking-wider px-3.5 py-1.5 rounded-lg transition-all cursor-pointer active:scale-98 shadow-sm";
            } else {
                ping.classList.add('hidden');
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-slate-600";
                text.innerText = "Auto refresh paused";
                btn.innerText = "RESUME";
                btn.className = "bg-blue-950/20 hover:bg-blue-950/40 text-blue-400 border border-blue-900/30 font-mono text-[10px] font-black tracking-wider px-3.5 py-1.5 rounded-lg transition-all cursor-pointer active:scale-98 shadow-sm";
            }
        }

        function activateAutoRefresh(arrived = false) {
            const widget = document.getElementById('autoRefreshWidget');
            const btn = document.getElementById('btnToggleAutoRefresh');

            if (arrived) {
                deactivateAutoRefresh(false);
                widget.classList.add('hidden');
                return;
            }

            widget.classList.remove('hidden');
            btn.classList.remove('hidden');
            isAutoRefreshActive = true;
            refreshSecondsLeft = REFRESH_PERIOD;
            updateAutoRefreshInterface();

            // Clear any lingering timers
            clearInterval(countdownTimer);

            countdownTimer = setInterval(() => {
                if (isAutoRefreshActive) {
                    refreshSecondsLeft--;
                    if (refreshSecondsLeft <= 0) {
                        refreshSecondsLeft = REFRESH_PERIOD;
                        searchTrain(true);
                    }
                    updateAutoRefreshInterface();
                }
            }, 1000);
        }

        function deactivateAutoRefresh(tripCompleted = false) {
            isAutoRefreshActive = false;
            clearInterval(countdownTimer);

            const widget = document.getElementById('autoRefreshWidget');
            const text = document.getElementById('autoRefreshStatusText');
            const btn = document.getElementById('btnToggleAutoRefresh');

            if (tripCompleted) {
                widget.classList.remove('hidden');
                const ping = document.getElementById('autoRefreshStatusPing');
                const dot = document.getElementById('autoRefreshStatusDot');

                ping.classList.add('hidden');
                dot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                text.innerText = "Trip completed. Update finished.";
                btn.classList.add('hidden'); // Hide the button as it is no longer needed
            } else {
                updateAutoRefreshInterface();
            }
        }

        function toggleAutoRefresh() {
            if (isAutoRefreshActive) {
                deactivateAutoRefresh(false);
            } else {
                // Reactivate auto refresh (without arrived flag, handled in the initial flow)
                activateAutoRefresh(false);
            }
        }

        function toggleStationsPassed() {
            const collapsed = document.getElementById('collapsedStations');
            const icon = document.getElementById('toggleCollapsedIcon');
            const textSpan = document.querySelector('#toggleCollapsedRow div');
            const count = collapsed.children.length;

            if (collapsed.classList.contains('hidden')) {
                collapsed.classList.remove('hidden');
                icon.innerText = "▲";
                textSpan.innerHTML = `Hide previous stations`;
                isStationsExpanded = true;
            } else {
                collapsed.classList.add('hidden');
                icon.innerText = "▼";
                textSpan.innerHTML = `Show <span class="font-black text-blue-400 font-mono">${count}</span> more passed stations`;
                isStationsExpanded = false;
            }
        }
    </script>
</body>

</html>
